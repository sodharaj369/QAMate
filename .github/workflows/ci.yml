name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile & Typecheck
        run: npm run build

      - name: Lint Codebase
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Package Extension
        run: npx @vscode/vsce package --no-dependencies --out qamate.vsix
        working-directory: packages/vscode-extension

      - name: Upload Packaged VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qamate-extension
          path: packages/vscode-extension/qamate.vsix
          if-no-files-found: error
